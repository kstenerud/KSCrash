name: Public API Diff

on:
  pull_request:
    paths:
      - "Sources/**"
      - "Package.swift"
      - "scripts/api-diff*"
      - "scripts/api-break-ignore.txt"
      - ".github/workflows/api-check.yml"
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  api-check:
    name: latest stable release vs HEAD
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Latest Stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve baseline ref (latest stable release)
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref="$(gh release view --json tagName -q .tagName)"
          echo "Latest stable release: $ref"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Compare public API
        id: compare
        run: |
          mkdir -p .api-diff-work
          bash scripts/api-diff.sh compare "${{ steps.base.outputs.ref }}" "${{ github.sha }}" .api-diff-work \
            2>&1 | tee api-diff.log
          exit ${PIPESTATUS[0]}
        timeout-minutes: 20

      - name: Annotate breaking changes
        if: failure() && steps.compare.conclusion == 'failure'
        run: |
          python3 - <<'PY'
          import os, re, glob

          IGNORE_FILE = os.environ.get("API_BREAK_IGNORE_FILE", "scripts/api-break-ignore.txt")
          ignore_patterns = []
          if os.path.isfile(IGNORE_FILE):
              with open(IGNORE_FILE) as f:
                  for raw in f:
                      s = raw.strip()
                      if s and not s.startswith("#"):
                          try:
                              ignore_patterns.append(re.compile(s, re.IGNORECASE))
                          except re.error:
                              pass

          BREAKING_SECTIONS = {
              "Removed Decls", "Renamed Decls", "Type Changes",
              "Class Inheritance Change", "Protocol Requirement Change",
              "Generic Signature Changes",
          }
          ATTR_PHRASES = (
              "is now throwing", "is no longer throwing",
              "is now not class", "is no longer class",
              "is now not static", "is no longer static",
          )
          line_re = re.compile(r"^([A-Za-z_][\w]*)(?:\(([^)]+)\))?:\s*(.+)$")
          header_re = re.compile(r"^/\*\s+(.*?)\s+\*/\s*$")

          def resolve(module, basename):
              if not basename:
                  return None
              for cand in glob.glob(f"Sources/{module}/**/{basename}", recursive=True):
                  return cand
              for cand in glob.glob(f"Sources/**/{basename}", recursive=True):
                  return cand
              return None

          def emit(props, msg):
              attrs = ",".join(f"{k}={v}" for k, v in props.items() if v)
              # Escape per GitHub workflow-command rules
              msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error {attrs}::{msg}")

          total = 0
          for path in sorted(glob.glob(".api-diff-work/reports/*.diff.txt")):
              module = os.path.basename(path)[:-len(".diff.txt")]
              section = None
              with open(path) as f:
                  for raw in f:
                      line = raw.rstrip("\n")
                      m = header_re.match(line)
                      if m:
                          section = m.group(1)
                          continue
                      if not line.strip():
                          continue
                      breaking = (
                          section in BREAKING_SECTIONS
                          or (section == "Protocol Conformance Change" and "removed conformance to" in line)
                          or (section == "Decl Attribute changes" and any(p in line for p in ATTR_PHRASES))
                      )
                      if not breaking:
                          continue
                      if any(p.search(line) for p in ignore_patterns):
                          continue
                      m = line_re.match(line)
                      if m:
                          mod, basename, msg = m.group(1), m.group(2), m.group(3)
                          file_path = resolve(mod, basename)
                          props = {"title": f"API break in {mod}"}
                          if file_path:
                              props["file"] = file_path
                              props["line"] = "1"
                          emit(props, f"[{section}] {msg}")
                      else:
                          emit({"title": f"API break in {module}"}, f"[{section}] {line}")
                      total += 1
          print(f"::notice::Annotated {total} breaking change(s); see Files changed for inline highlights.")
          PY

      - name: Build summary markdown
        if: always() && (steps.compare.conclusion == 'success' || steps.compare.conclusion == 'failure')
        id: summary
        run: |
          python3 scripts/api-diff-summary.py \
            .api-diff-work/reports \
            "${{ steps.base.outputs.ref }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > break-summary.md
          cat break-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post or clear sticky PR comment
        if: always() && github.event_name == 'pull_request' && (steps.compare.conclusion == 'success' || steps.compare.conclusion == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OUTCOME: ${{ steps.compare.conclusion }}
        run: |
          MARKER="<!-- api-diff-comment -->"
          existing=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty")
          if [ "$OUTCOME" = "success" ]; then
            if [ -n "$existing" ]; then
              gh api -X DELETE "repos/$REPO/issues/comments/$existing"
              echo "Removed stale sticky comment $existing (no actionable breaks)."
            else
              echo "No breaks and no prior comment; nothing to do."
            fi
          else
            if [ -n "$existing" ]; then
              gh api -X PATCH "repos/$REPO/issues/comments/$existing" --field body=@break-summary.md >/dev/null
              echo "Updated comment $existing"
            else
              gh pr comment "$PR" --body-file break-summary.md
            fi
          fi

      - name: Upload diff reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-diff-reports
          path: |
            .api-diff-work/reports/
            .api-diff-work/old-json/
            .api-diff-work/new-json/
            api-diff.log
          retention-days: 14
          if-no-files-found: warn
