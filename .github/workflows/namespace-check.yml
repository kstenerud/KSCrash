name: Namespace Check

on:
  pull_request:
    paths:
      - 'Sources/**'
      - 'namespacer/**'
      - '.github/workflows/namespace-check.yml'
      - 'Makefile'

  push:
    branches:
      - master

  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  namespace-check:
    name: Namespace Header Check
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Check namespace header
      id: check
      run: |
        make namespace-check

    - name: Create Check Run
      if: >-
        always() &&
        (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/github-script@v7
      with:
        script: |
          const passed = '${{ steps.check.outcome }}' === 'success';
          const title = passed
            ? 'Namespace header is up to date'
            : 'Namespace header is out of date';
          const summary = passed
            ? ':white_check_mark: `KSCrashNamespace.h` matches the current source files.'
            : [
                '## Namespace header is out of date',
                '',
                'The checked-in `KSCrashNamespace.h` does not match what the namespacer generates from the current source files.',
                '',
                'Please run `make namespace` locally and commit the updated header.',
              ].join('\n');
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: ${{ job.check_run_id }},
            output: { title, summary },
          });
